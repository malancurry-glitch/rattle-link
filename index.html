<head>

  <script src="https://accounts.google.com/gsi/client" async defer></script>

 <style>

/* ================= BASE ================= */
body {
  margin:0;

  display:flex;

@keyframes spin{

<body>

<div class="theme-toggle" onclick="toggleTheme()">🌗</div>

<div class="wrapper">

  <!-- LEFT PANEL -->
  <div class="left">
    <h1>🐍 Rattle Link</h1>
    <p>Shorten links. Track clicks. Grow faster.</p>

    <div class="features">
      <span>⚡ Fast</span>
      <span>📊 Analytics</span>
      <span>🔐 Secure</span>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="card" id="card">

    <!-- HEADER -->
    <div class="auth-header">
      <h2 id="title">Login</h2>
      <p class="sub">Welcome back 👋</p>
    </div>

    <!-- USERNAME -->
    <div class="input-group">
      <input id="username" required placeholder=" ">
      <label>Email or Username</label>
    </div>

    <!-- PASSWORD -->
    <div class="input-group password-box">
      <input id="password" type="password" required placeholder=" " oninput="checkStrength()">
      <label>Password</label>
      <span class="toggle" onclick="togglePass()">👁</span>
    </div>

    <!-- CONFIRM (SIGNUP ONLY) -->
    <div class="input-group" id="confirmBox" style="display:none;">
      <input id="confirm" type="password" placeholder=" ">
      <label>Confirm Password</label>
    </div>

    <!-- PASSWORD STRENGTH -->
    <div class="strength-bar">
      <div id="strengthFill"></div>
    </div>
    <div id="strength" class="strength-text"></div>

    <!-- OPTIONS -->
    <div class="row">
      <label>
        <input type="checkbox" id="remember"> Remember me
      </label>
      <span onclick="forgot()" class="link">Forgot password?</span>
    </div>

    <!-- CAPTCHA -->
    <div style="margin:12px 0;">
      <div class="g-recaptcha" data-sitekey="6LfBaZwsAAAAAIOf9TIaONCgBvyF3L9OXPkmDeAS"></div>
    </div>

    <!-- MAIN BUTTON -->
    <button class="primary" id="mainBtn" onclick="handleAuth()">
      <span id="btnText">Login</span>
      <span id="spinner" class="spinner" style="display:none;"></span>
    </button>

    <!-- SECONDARY ACTION -->
    <button class="secondary" onclick="forgot()">
      🔑 Reset Password
    </button>

    <!-- SWITCH MODE -->
    <div class="switch">
      <span id="switchText">Don't have an account?</span>
      <span onclick="toggleMode()" id="switchBtn">Sign up</span>
    </div>

    <!-- ERROR -->
    <div id="error" class="error"></div>

  </div>

</div>

<script src="https://www.google.com/recaptcha/api.js" async defer></script>

<script>
const API = "https://suvegwrmzl.execute-api.us-east-2.amazonaws.com";

let isSignup = false;

// ================= DOM =================
const card = document.getElementById("card");
const errorBox = document.getElementById("error");
const mainBtn = document.getElementById("mainBtn");
const btnText = document.getElementById("btnText");
const spinner = document.getElementById("spinner");

const username = document.getElementById("username");
const password = document.getElementById("password");
const confirmBox = document.getElementById("confirmBox");
const remember = document.getElementById("remember");

const title = document.getElementById("title");
const switchText = document.getElementById("switchText");
const switchBtn = document.getElementById("switchBtn");

const strengthFill = document.getElementById("strengthFill");
const strength = document.getElementById("strength");

// ================= UI =================
function toggleTheme(){
  document.body.classList.toggle("light");
}

function showError(msg){
  errorBox.innerText = msg || "";
  card.classList.remove("shake");
  void card.offsetWidth;
  card.classList.add("shake");
}

function setLoading(state){
  mainBtn.disabled = state;
  btnText.style.display = state ? "none" : "inline";
  spinner.style.display = state ? "inline-block" : "none";
}

function togglePass(){
  password.type = password.type === "password" ? "text" : "password";
}

// ================= STRENGTH =================
function checkStrength(){
  if(!isSignup) return;

  const val = password.value;
  let score = 0;

  if(val.length > 6) score++;
  if(/[A-Z]/.test(val)) score++;
  if(/[0-9]/.test(val)) score++;
  if(/[^A-Za-z0-9]/.test(val)) score++;

  const colors = ["#ef4444","#f59e0b","#22c55e","#06b6d4"];
  const labels = ["Weak","Medium","Strong","Very Strong"];

  strengthFill.style.width = (score * 25) + "%";
  strengthFill.style.background = colors[score-1] || "#ef4444";
  strength.innerText = val ? labels[score-1] || "Weak" : "";
}

// ================= MODE =================
function toggleMode(){
  isSignup = !isSignup;

  title.innerText = isSignup ? "Sign Up" : "Login";
  btnText.innerText = isSignup ? "Create Account" : "Login";
  switchText.innerText = isSignup ? "Already have an account?" : "Don't have an account?";
  switchBtn.innerText = isSignup ? "Login" : "Sign up";

  confirmBox.style.display = isSignup ? "block" : "none";
  showError("");
}

// ================= MAIN =================
async function handleAuth(){
  if(mainBtn.disabled) return;
  if(isSignup) await signup();
  else await login();
}

// ================= SIGNUP =================
async function signup(){

  showError("");
  setLoading(true);

  const user = username.value.trim().toLowerCase();
  const pass = password.value;
  const confirm = document.getElementById("confirm").value;
  const captcha = grecaptcha.getResponse();

  if(!user){
    showError("Enter email ❌");
    setLoading(false);
    return;
  }

  if(pass.length < 6){
    showError("Password must be 6+ characters ❌");
    setLoading(false);
    return;
  }

  if(pass !== confirm){
    showError("Passwords do not match ❌");
    setLoading(false);
    return;
  }

  if(!captcha){
    showError("Complete CAPTCHA ❌");
    setLoading(false);
    return;
  }

  try {

    const res = await fetch(API+"/signup",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ username:user, password:pass, captcha })
    });

    const text = await res.text();

    if(res.status !== 200){
      showError(text || "Signup failed ❌");
      grecaptcha.reset();
      setLoading(false);
      return;
    }

    showError("Account created ✅");
    card.classList.add("success");

    setTimeout(()=>toggleMode(),800);

  } catch (e){
    console.error(e);
    showError("Signup failed ❌");
  }

  setLoading(false);
  grecaptcha.reset();
}

// ================= LOGIN =================
async function login(){

  showError("");
  setLoading(true);

  const user = username.value.trim().toLowerCase();
  const pass = password.value;
  const captcha = grecaptcha.getResponse();

  if(!user){
    showError("Enter username ❌");
    setLoading(false);
    return;
  }

  if(!pass){
    showError("Enter password ❌");
    setLoading(false);
    return;
  }

  if(!captcha){
    showError("Complete CAPTCHA ❌");
    setLoading(false);
    return;
  }

  try {

    const res = await fetch(API+"/login",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ username:user, password:pass, captcha })
    });

    const data = await res.json();

    if(res.status !== 200 || !data.token){
      showError(data.message || "Invalid login ❌");
      grecaptcha.reset();
      setLoading(false);
      return;
    }

    // SAVE SESSION
    localStorage.setItem("token", data.token);
    localStorage.setItem("role", data.role);
    localStorage.setItem("lastUser", user);

    if(remember.checked){
      localStorage.setItem("rememberUser", user);
    }

    card.classList.add("success");

    setTimeout(()=>{
      window.location.href = data.role === "admin"
        ? "admin.html"
        : "dashboard.html";
    },500);

  } catch (e){
    console.error(e);
    showError("Server error ❌");
  }

  setLoading(false);
  grecaptcha.reset();
}

// ================= FORGOT =================
function forgot(){
  window.location.href = "forgot.html";
}

// ================= REMEMBER =================
window.onload = () => {
  const saved = localStorage.getItem("rememberUser");
  if(saved){
    username.value = saved;
    remember.checked = true;
  }
};
</script>
</body>
