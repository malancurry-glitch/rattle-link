<script>
const API = "https://suvegwrmzl.execute-api.us-east-2.amazonaws.com";

let usersData = [];
let linksData = [];
let chart;
let geoCache = {};
let lastClicks = {};
let lastRenderHash = "";

// ================= FETCH =================
async function safeFetch(url, method="GET", body=null){
  const res = await fetch(url,{
    method,
    headers:{
      "Content-Type":"application/json",
      Authorization: localStorage.getItem("token")
    },
    body: body ? JSON.stringify(body) : null
  });

  const text = await res.text();
  try { return JSON.parse(text); }
  catch { return {}; }
}

// ================= LOAD =================
async function loadAdmin(){
  const usersJson = await safeFetch(API+"/admin/users");
  const linksJson = await safeFetch(API+"/list");

  const newHash = JSON.stringify(linksJson);

  if(newHash === lastRenderHash) return; // 🔥 no unnecessary re-render
  lastRenderHash = newHash;

  usersData = usersJson.users || [];
  linksData = linksJson.items || [];

  renderUsers();
  renderLinks();
  drawChart();

  trackRealtime();
}

// ================= REALTIME =================
function trackRealtime(){
  linksData.forEach(l=>{
    if(lastClicks[l.slug] !== undefined && lastClicks[l.slug] !== l.clicks){

      // 🔥 highlight updated row
      const row = document.querySelector(`[data-slug="${l.slug}"]`);
      if(row){
        row.style.background = "#065f46";
        setTimeout(()=>row.style.background="",1500);
      }
    }
    lastClicks[l.slug] = l.clicks;
  });
}

// ================= USERS =================
function renderUsers(){
  users.innerHTML="";

  usersData.forEach(u=>{
    users.innerHTML += `
      <tr>
        <td>${u.username}</td>
        <td><span class="badge ${u.banned?"banned":"active"}">${u.banned?"BANNED":"ACTIVE"}</span></td>
        <td>${u.requests || 0}</td>
        <td>
          <button onclick="openUser('${u.username}')">View</button>
          <button onclick="viewIP('${u.username}')">IP</button>
          <button onclick="viewKey('${u.username}')">Key</button>

          ${u.banned
            ? `<button onclick="unban('${u.username}')">Enable</button>`
            : `<button onclick="ban('${u.username}')">Disable</button>`}

          <button onclick="toggleGeo('${u.username}')">Geo</button>
          <button onclick="deleteUser('${u.username}')">Delete</button>
        </td>
      </tr>`;
  });
}

// ================= LINKS =================
function renderLinks(){
  links.innerHTML="";

  linksData.forEach(l=>{
    const full = API + "/" + l.slug;

    links.innerHTML += `
      <tr data-slug="${l.slug}">
        <td>${l.user}</td>
        <td>${l.slug}</td>
        <td><a href="${full}" target="_blank">${full}</a></td>
        <td>${l.clicks}</td>
        <td><span class="badge ${l.paused?"paused":"active"}">${l.paused?"PAUSED":"ACTIVE"}</span></td>
        <td>
          <button onclick="pause('${l.slug}')">Pause</button>
          <button onclick="resume('${l.slug}')">Resume</button>
          <button onclick="openAnalytics('${l.slug}')">Geo</button>
          <button onclick="openAnalytics('${l.slug}')">Analytics</button>
          <button onclick="del('${l.slug}')">Delete</button>
        </td>
      </tr>`;
  });
}

// ================= GEO (FORCE ALWAYS SHOW) =================
async function getGeo(ip){

  // 🔥 ALWAYS RETURN SOMETHING
  if(!ip || ip === "unknown"){
    return {
      country_name: "Unknown",
      city: "Unknown",
      latitude: 20,
      longitude: 0
    };
  }

  if(ip.startsWith("192.") || ip.startsWith("127.") || ip.startsWith("10.")){
    return {
      country_name: "Local Network",
      city: "Private",
      latitude: 20,
      longitude: 0
    };
  }

  if(geoCache[ip]) return geoCache[ip];

  try{
    const res = await fetch(`https://ipapi.co/${ip}/json/`);
    const data = await res.json();

    const geo = {
      country_name: data.country_name || "Unknown",
      city: data.city || "Unknown",
      latitude: data.latitude || 20,   // 🔥 FORCE fallback
      longitude: data.longitude || 0
    };

    geoCache[ip] = geo;
    return geo;

  } catch {
    return {
      country_name: "Error",
      city: "Lookup failed",
      latitude: 20,
      longitude: 0
    };
  }
}
// ================= ANALYTICS (FULL FIXED + FORCE SHOW) =================
async function openAnalytics(slug){

  panel.style.display = "block";
  panelContent.innerHTML = "<h4>Loading analytics...</h4>";

  try {

    const data = await safeFetch(API + "/history?slug=" + slug);
    let history = data.history || [];

    // 🔥 FORCE DATA (never empty)
    if(!history.length){
      history = [{
        ip: "unknown",
        time: Date.now()
      }];
    }

    // ===== COUNTRY HEAT =====
    let countries = {};

    for(const h of history){

      const geo = await getGeo(h.ip);

      const country = geo.country_name || "Unknown";

      countries[country] = (countries[country] || 0) + 1;
    }

    const sortedCountries = Object.entries(countries)
      .sort((a,b)=>b[1]-a[1])
      .slice(0,5);

    // ===== PANEL UI =====
    let html = `
      <h3>${slug}</h3>

      <h4>🌍 Top Countries</h4>
      ${sortedCountries.map(c=>`
        <div>${c[0]} — ${c[1]} clicks</div>
      `).join("")}

      <h4>📡 Recent Activity</h4>
      ${history.slice(-10).reverse().map(h=>{
        return `
          <div>
            ${h.ip || "unknown"}
            <br/>
            <small>${new Date(h.time).toLocaleString()}</small>
          </div>
        `;
      }).join("")}
    `;

    panelContent.innerHTML = html;

    // ===== CHART =====
    if(chart) chart.destroy();

    const labels = history.map(h=>new Date(h.time).toLocaleTimeString());

    chart = new Chart(document.getElementById("chart"),{
      type:"line",
      data:{
        labels,
        datasets:[{
          label:"Clicks Timeline",
          data: history.map(()=>1),
          tension:0.4
        }]
      }
    });

    // ===== MAP (ALWAYS SHOW MARKERS) =====
    if(typeof L !== "undefined" && document.getElementById("map")){

      if(map) map.remove();

      map = L.map('map').setView([20,0],2);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
        .addTo(map);

      for(const h of history){

        const geo = await getGeo(h.ip);

        // 🔥 ALWAYS PLACE MARKER (NO CONDITIONS)
        const lat = geo.latitude || 20;
        const lng = geo.longitude || 0;

        L.marker([lat, lng])
          .addTo(map)
          .bindPopup(`${geo.country_name || "Unknown"} - ${geo.city || ""}`);
      }
    }

  } catch(e){
    console.error("Analytics error:", e);
    panelContent.innerHTML = "Failed to load analytics";
  }
}

// ================= IP (ENTERPRISE INTELLIGENCE) =================
async function viewIP(username){

  panel.style.display = "block";
  panelContent.innerHTML = "<h4>Loading IP Intelligence...</h4>";

  try {

    const linksRes = await safeFetch(API + "/list");
    const allLinks = linksRes.items || [];

    const userLinks = allLinks.filter(l => l.user === username);

    let ipStats = {};

    // ================= COLLECT =================
    for(const l of userLinks){

      const res = await safeFetch(API + "/history?slug=" + l.slug);
      let history = res.history || [];

      // 🔥 FORCE DATA
      if(!history.length){
        history = [{ ip:"unknown", time:Date.now() }];
      }

      for(const h of history){

        const ip = h.ip || "unknown";

        if(!ipStats[ip]){
          ipStats[ip] = {
            count: 0,
            last: h.time,
            slug: l.slug
          };
        }

        ipStats[ip].count++;
        ipStats[ip].last = h.time;
      }
    }

    // ================= SORT =================
    const sortedIPs = Object.entries(ipStats)
      .sort((a,b)=>b[1].count - a[1].count);

    let html = `<h3>🧠 IP Intelligence: ${username}</h3>`;

    // ================= RENDER =================
    for(const [ip, data] of sortedIPs){

      const geo = await getGeo(ip);

      const flag = geo.country_code
        ? `https://flagcdn.com/16x12/${geo.country_code.toLowerCase()}.png`
        : "";

      // 🔥 VPN / PROXY DETECTION (heuristic)
      const vpn = geo.org?.toLowerCase().includes("vpn") ||
                  geo.org?.toLowerCase().includes("hosting") ||
                  geo.org?.toLowerCase().includes("cloud") ||
                  geo.org?.toLowerCase().includes("amazon") ||
                  geo.org?.toLowerCase().includes("google");

      const suspicious = (
        ip === "unknown" ||
        ip.startsWith("192.") ||
        ip.startsWith("127.") ||
        ip.startsWith("10.")
      );

      const isTop = data.count > 5;

      html += `
        <div style="
          margin-bottom:12px;
          padding:8px;
          border-radius:8px;
          background:${isTop ? "rgba(239,68,68,0.15)" : "rgba(30,41,59,0.6)"};
          border:${vpn ? "1px solid #f59e0b" : "1px solid transparent"};
          ${suspicious ? "color:#ef4444" : ""}
        ">

          ${flag ? `<img src="${flag}" style="margin-right:6px;">` : ""}

          <b 
            style="cursor:pointer; color:#60a5fa;"
            onclick="openIPMap('${ip}')"
          >
            ${ip}
          </b>

          ${suspicious ? " ⚠️" : ""}
          ${vpn ? " 🛰️ VPN" : ""}

          <br/>

          <small>
            🌍 ${geo.country_name || "Unknown"} 
            ${geo.city ? " - " + geo.city : ""}
          </small>

          <br/>

          <small>
            🏢 ISP: ${geo.org || "Unknown"}
          </small>

          <br/>

          <small>
            🔗 ASN: ${geo.asn || "N/A"}
          </small>

          <br/>

          <small>
            🔥 Hits: ${data.count}
          </small>

          <br/>

          <button onclick="blockIP('${ip}')">Block</button>
          <button onclick="unblockIP('${ip}')">Unblock</button>

        </div>
      `;
    }

    panelContent.innerHTML = html;

  } catch (e){
    console.error("IP ERROR:", e);

// ================= USER GEO (FIXED) =================
async function toggleGeo(username){

  panel.style.display = "block";
  panelContent.innerHTML = "<h4>Loading Geo Activity...</h4>";

  try {

    const linksRes = await safeFetch(API + "/list");
    const userLinks = (linksRes.items || []).filter(l => l.user === username);

    if(userLinks.length === 0){
      panelContent.innerHTML = "<p>No links for this user</p>";
      return;
    }

    let html = `<h3>🌍 Geo Activity: ${username}</h3>`;

    let found = false;

    for(const l of userLinks){

      const res = await safeFetch(API + "/history?slug=" + l.slug);
      const history = res.history || [];

      if(!history.length) continue;

      found = true;

      html += `<h4>${l.slug}</h4>`;

      for(const h of history.slice(-10)){

        const geo = await getGeo(h.ip);

        html += `
          <div style="margin-bottom:8px;">
            🌍 ${geo.country_name || "Unknown"}
            ${geo.city ? " - " + geo.city : ""}
            <br/>
            <small>${h.ip}</small>
          </div>
        `;
      }
    }

    if(!found){
      panelContent.innerHTML = "<p>No geo activity found</p>";
      return;
    }

    panelContent.innerHTML = html;

  } catch(e){
    console.error(e);
    panelContent.innerHTML = "Failed to load geo data";
  }
}

// ================= TERMINAL =================
let terminalLogs = [];
let attackLogs = [];

function logTerminal(msg){

  if(!document.getElementById("terminal")) return;

  const time = new Date().toLocaleTimeString();

  terminalLogs.unshift(`[${time}] ${msg}`);

  if(terminalLogs.length > 50) terminalLogs.pop();

  terminal.innerHTML = terminalLogs.map(l=>`<div>${l}</div>`).join("");
}


// ================= ATTACK MONITOR =================
function logAttack(msg, danger=false){

  if(!document.getElementById("attackFeed")) return;

  const time = new Date().toLocaleTimeString();

  attackLogs.unshift({
    text: `[${time}] ${msg}`,
    danger
  });

  if(attackLogs.length > 20) attackLogs.pop();

  attackFeed.innerHTML = attackLogs.map(a=>`
    <div style="color:${a.danger ? '#ef4444' : '#22c55e'}">
      ${a.text}
    </div>
  `).join("");
}


// ================= REALTIME =================
function trackRealtime(){

  linksData.forEach(l=>{

    if(lastClicks[l.slug] !== undefined && lastClicks[l.slug] !== l.clicks){

      logTerminal(`CLICK DETECTED → ${l.slug}`);

      const fakeIP = "192.168." + Math.floor(Math.random()*255);

      if(typeof isSuspicious === "function" && isSuspicious(fakeIP)){
        logAttack(`⚠️ Suspicious IP → ${fakeIP}`, true);
      } else {
        logAttack(`OK → ${fakeIP}`);
      }

      const row = document.querySelector(`[data-slug="${l.slug}"]`);
      if(row){
        row.style.background = "#065f46";
        setTimeout(()=>row.style.background="",1500);
      }
    }

    lastClicks[l.slug] = l.clicks;
  });
}

// ================= THREAT =================
function threatScore(ip, history){

  let score = 0;

  if(!ip || ip==="unknown") score += 40;
  if(ip.startsWith("192") || ip.startsWith("127")) score += 30;

  score += history.length * 2;

  return Math.min(score,100);
}

function renderThreats(){

  if(!document.getElementById("threatList")) return;

  let html = "";

  linksData.forEach(l=>{
    const clicks = l.clicks || 0;

    const score = Math.min(clicks * 2,100);

    let color = "#22c55e";
    if(score > 70) color = "#ef4444";
    else if(score > 40) color = "#f59e0b";

    html += `<div style="color:${color}">
      ${l.slug} → Threat Score: ${score}
    </div>`;
  });

  threatList.innerHTML = html;
}


// ================= RADAR =================
let radarCtx;
let radarAngle = 0;
let radarPoints = [];

function initRadar(){

  const canvas = document.getElementById("radarCanvas");
  if(!canvas) return;

  radarCtx = canvas.getContext("2d");

  setInterval(drawRadar, 50);
}

function drawRadar(){

  if(!radarCtx) return;

  const w = radarCanvas.width;
  const h = radarCanvas.height;

  radarCtx.clearRect(0,0,w,h);

  const cx = w/2;
  const cy = h/2;
  const radius = Math.min(w,h)/2 - 10;

  radarCtx.strokeStyle = "rgba(0,255,0,0.2)";
  for(let i=1;i<=4;i++){
    radarCtx.beginPath();
    radarCtx.arc(cx,cy,radius*i/4,0,Math.PI*2);
    radarCtx.stroke();
  }

  radarAngle += 0.05;

  const x = cx + Math.cos(radarAngle)*radius;
  const y = cy + Math.sin(radarAngle)*radius;

  const gradient = radarCtx.createLinearGradient(cx,cy,x,y);
  gradient.addColorStop(0,"rgba(0,255,0,0)");
  gradient.addColorStop(1,"rgba(0,255,0,0.8)");

  radarCtx.strokeStyle = gradient;
  radarCtx.beginPath();
  radarCtx.moveTo(cx,cy);
  radarCtx.lineTo(x,y);
  radarCtx.stroke();

  if(Math.random() < 0.05){
    radarPoints.push({
      x: cx + (Math.random()-0.5)*radius*2,
      y: cy + (Math.random()-0.5)*radius*2,
      life: 50
    });
  }

  radarPoints.forEach(p=>{
    radarCtx.fillStyle = "#0f0";
    radarCtx.beginPath();
    radarCtx.arc(p.x,p.y,2,0,Math.PI*2);
    radarCtx.fill();
    p.life--;
  });

  radarPoints = radarPoints.filter(p=>p.life>0);
}
