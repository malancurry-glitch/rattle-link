<!DOCTYPE html>
<html>
<head>
  <title>Reset Password - Rattle Link</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
body {
  margin:0;
  font-family:Inter, Arial;
  background:radial-gradient(circle at top, #020617, #000);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.wrapper {
  display:flex;
  width:750px;
  max-width:95%;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.7);
}

.left {
  flex:1;
  background:linear-gradient(135deg,#3b82f6,#06b6d4);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  padding:30px;
  text-align:center;
}

.features{
  margin-top:20px;
  display:flex;
  gap:10px;
}

.features span{
  background:#000;
  border:1px solid #0ff;
  padding:4px 8px;
  font-size:11px;
  border-radius:6px;
}

.card {
  flex:1;
  background:rgba(2,6,23,0.9);
  padding:30px;
  text-align:center;
}

.card.success{
  animation:successGlow 1s;
}

@keyframes successGlow {
  0%{box-shadow:0 0 5px #22c55e;}
  50%{box-shadow:0 0 40px #22c55e;}
  100%{box-shadow:0 0 5px #22c55e;}
}

.input-group {
  position:relative;
  margin-bottom:14px;
}

.input-group input {
  width:100%;
  padding:12px;
  border-radius:8px;
  border:1px solid rgba(0,255,255,0.2);
  background:#000;
  color:#0ff;
}

.toggle{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
}

.strength-bar{
  height:5px;
  background:#111;
  border-radius:6px;
  overflow:hidden;
}

#strengthFill{
  height:100%;
  width:0%;
  transition:0.3s;
}

.strength-text{
  font-size:12px;
  margin-bottom:10px;
}

.match{
  font-size:12px;
  margin-top:5px;
}

.match.ok{ color:#22c55e; }
.match.bad{ color:#ef4444; }

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#0ff;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

button:disabled{
  opacity:0.5;
  cursor:not-allowed;
}

.spinner{
  width:14px;
  height:14px;
  border:2px solid #000;
  border-top:2px solid transparent;
  border-radius:50%;
  animation:spin 1s linear infinite;
  display:none;
}

@keyframes spin{
  to{ transform:rotate(360deg); }
}

.msg{
  margin-top:10px;
}

.error{ color:#ef4444; }
.successText{ color:#22c55e; }

  </style>
</head>

<body>

<div class="wrapper">

  <div class="left">
    <h1>🐍 Rattle Link</h1>
    <p>Secure password reset</p>
    <div class="features">
      <span>🔐 Secure</span>
      <span>⚡ Fast</span>
      <span>🛡️ Protected</span>
    </div>
  </div>

  <div class="card" id="card">

    <h2>Reset Password</h2>
    <p>Create a new password</p>

    <div class="input-group">
      <input id="password" type="password" placeholder="New Password" oninput="validateAll()">
      <span class="toggle" onclick="togglePass('password')">👁</span>
    </div>

    <div class="input-group">
      <input id="confirm" type="password" placeholder="Confirm Password" oninput="validateAll()">
      <span class="toggle" onclick="togglePass('confirm')">👁</span>
    </div>

    <div class="strength-bar">
      <div id="strengthFill"></div>
    </div>
    <div id="strengthText" class="strength-text"></div>

    <div id="matchText" class="match"></div>

    <button onclick="resetPassword()" id="btn" disabled>
      <span id="btnText">Reset Password</span>
      <span id="spinner" class="spinner"></span>
    </button>

    <div id="msg" class="msg"></div>

  </div>

</div>

<script>
const API = "https://suvegwrmzl.execute-api.us-east-2.amazonaws.com";
const token = new URLSearchParams(window.location.search).get("token");

// ================= UI =================
function show(msg, type="error"){
  const el = document.getElementById("msg");
  el.innerText = msg;
  el.className = "msg " + (type === "success" ? "successText" : "error");
}

function setLoading(state){
  btn.disabled = state;
  spinner.style.display = state ? "inline-block" : "none";
  btnText.style.display = state ? "none" : "inline";
}

// ================= PASSWORD =================
function togglePass(id){
  const input = document.getElementById(id);
  input.type = input.type === "password" ? "text" : "password";
}

// ================= VALIDATION =================
function validateAll(){

  const pass = document.getElementById("password").value;
  const confirm = document.getElementById("confirm").value;

  let score = 0;

  if(pass.length > 6) score++;
  if(/[A-Z]/.test(pass)) score++;
  if(/[0-9]/.test(pass)) score++;
  if(/[^A-Za-z0-9]/.test(pass)) score++;

  const colors = ["#ef4444","#f59e0b","#22c55e","#06b6d4"];
  const labels = ["Weak","Medium","Strong","Very Strong"];

  strengthFill.style.width = (score * 25) + "%";
  strengthFill.style.background = colors[score-1] || "#ef4444";

  strengthText.innerText = pass ? labels[score-1] || "Weak" : "";

  // MATCH CHECK
  if(confirm){
    if(pass === confirm){
      matchText.innerText = "Passwords match ✔";
      matchText.className = "match ok";
    } else {
      matchText.innerText = "Passwords do not match ❌";
      matchText.className = "match bad";
    }
  } else {
    matchText.innerText = "";
  }

  // ENABLE BUTTON
  btn.disabled = !(pass.length >= 6 && pass === confirm);
}

// ================= RESET =================
async function resetPassword(){

  const pass = document.getElementById("password").value;

  if(!token){
    show("Invalid link ❌");
    return;
  }

  setLoading(true);

  try {

    const res = await fetch(API+"/reset",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ token, password: pass })
    });

    const text = await res.text();

    if(res.status !== 200){
      show(text);
      setLoading(false);
      return;
    }

    card.classList.add("success");
    show("Password updated ✅","success");

    // 🔥 AUTO LOGIN
    const user = localStorage.getItem("lastUser");

    if(user){
      try{
        const loginRes = await fetch(API+"/login",{
          method:"POST",
          headers:{ "Content-Type":"application/json" },
          body: JSON.stringify({
            username:user,
            password:pass,
            captcha:"bypass"
          })
        });

        const data = await loginRes.json();

        if(data.token){
          localStorage.setItem("token", data.token);
          window.location.href = "dashboard.html";
          return;
        }

      } catch{}
    }

    setTimeout(()=>{
      window.location.href = "index.html";
    },1500);

  } catch {
    show("Network error ❌");
  }

  setLoading(false);
}
</script>

</body>
</html>
