<!DOCTYPE html>
<html>
<head>
  <title>Reset Password</title>

  <style>
    body{
      margin:0;
      font-family:Inter, Arial;
      background:#020617;
      display:flex;
      align-items:center;
      justify-content:center;
      height:100vh;
      color:#fff;
    }

    .card{
      background:#000;
      padding:30px;
      border-radius:12px;
      width:300px;
      text-align:center;
      box-shadow:0 0 30px #0ff;
    }

    input{
      width:100%;
      margin:8px 0;
      padding:10px;
      border-radius:6px;
      border:none;
      background:#020617;
      color:#0ff;
    }

    button{
      width:100%;
      padding:10px;
      margin-top:10px;
      background:#0ff;
      border:none;
      border-radius:6px;
      cursor:pointer;
      color:#000;
      font-weight:bold;
    }

    .msg{
      margin-top:10px;
      font-size:12px;
    }
  </style>
</head>

<body>

<div class="card">

  <h2>🔐 Reset Password</h2>

  <input id="newPass" type="password" placeholder="New password">
  <input id="confirmPass" type="password" placeholder="Confirm password">

  <button onclick="resetPassword()">Reset Password</button>

  <div id="msg" class="msg"></div>

</div>

<script>
const API = "https://suvegwrmzl.execute-api.us-east-2.amazonaws.com";

// 🔥 GET TOKEN FROM URL
const params = new URLSearchParams(window.location.search);
const token = params.get("token");

// ================= RESET =================
async function resetPassword(){

  msg.innerText = "";

  if(!newPass.value || !confirmPass.value){
    msg.innerText = "Fill all fields";
    return;
  }

  if(newPass.value !== confirmPass.value){
    msg.innerText = "Passwords do not match";
    return;
  }

  try {

    const res = await fetch(API+"/reset",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        token,
        password: newPass.value
      })
    });

    const text = await res.text();

    if(res.status === 200){
      msg.innerText = "✅ Password updated! Redirecting...";
      
      setTimeout(()=>{
        window.location.href = "index.html";
      },2000);

    } else {
      msg.innerText = text;
    }

  } catch {
    msg.innerText = "Reset failed ❌";
  }
}
</script>

</body>
</html>
