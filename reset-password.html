<!DOCTYPE html>
<html>
<head>
  <title>Reset Password - Rattle Link</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
body {
  margin:0;
  font-family:Inter, Arial;
  background:radial-gradient(circle at top, #020617, #000);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.wrapper {
  display:flex;
  width:750px;
  max-width:95%;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.7);
}

.left {
  flex:1;
  background:linear-gradient(135deg,#3b82f6,#06b6d4);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  padding:30px;
}

.card {
  flex:1;
  background:rgba(2,6,23,0.9);
  padding:30px;
  text-align:center;
}

.input-group {
  position:relative;
  margin-bottom:14px;
}

.input-group input {
  width:100%;
  padding:12px;
  border-radius:8px;
  border:1px solid rgba(0,255,255,0.2);
  background:#000;
  color:#0ff;
}

.toggle{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
}

.strength-bar{
  height:6px;
  background:#111;
  border-radius:6px;
  overflow:hidden;
}

#strengthFill{
  height:100%;
  width:0%;
  transition:0.3s;
}

.rules{
  font-size:11px;
  text-align:left;
  margin:8px 0;
}

.rules span{
  display:block;
  opacity:0.5;
}

.rules .ok{
  color:#22c55e;
  opacity:1;
}

.match{
  font-size:12px;
}

.match.ok{ color:#22c55e; }
.match.bad{ color:#ef4444; }

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#0ff;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

button:disabled{
  opacity:0.5;
}

.msg{
  margin-top:10px;
}

.error{ color:#ef4444; }
.successText{ color:#22c55e; }

.spinner{
  width:14px;
  height:14px;
  border:2px solid #000;
  border-top:2px solid transparent;
  border-radius:50%;
  animation:spin 1s linear infinite;
  display:none;
}

@keyframes spin{
  to{ transform:rotate(360deg); }
}

/* 🎉 CONFETTI */
.confetti{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
}
.confetti div{
  position:absolute;
  width:6px;
  height:6px;
  background:#0ff;
  animation:fall 2s linear forwards;
}
@keyframes fall{
  to{ transform:translateY(100vh); opacity:0;}
}
  </style>
</head>

<body>

<div class="wrapper">

  <div class="left">
    <h1>🐍 Rattle Link</h1>
    <p>Secure password reset</p>
  </div>

  <div class="card" id="card">

    <h2>Reset Password</h2>

    <div class="input-group">
      <input id="password" type="password" placeholder="New Password" oninput="validateAll()">
      <span class="toggle" onclick="togglePass('password')">👁</span>
    </div>

    <div class="input-group">
      <input id="confirm" type="password" placeholder="Confirm Password" oninput="validateAll()">
      <span class="toggle" onclick="togglePass('confirm')">👁</span>
    </div>

    <div class="strength-bar">
      <div id="strengthFill"></div>
    </div>

    <div id="strengthText"></div>

    <!-- RULES -->
    <div class="rules">
      <span id="r1">• 8+ characters</span>
      <span id="r2">• Uppercase letter</span>
      <span id="r3">• Number</span>
      <span id="r4">• Symbol</span>
    </div>

    <div id="matchText" class="match"></div>

    <button onclick="resetPassword()" id="btn" disabled>
      <span id="btnText">Reset Password</span>
      <span id="spinner" class="spinner"></span>
    </button>

    <div id="msg" class="msg"></div>

  </div>

</div>

<script>
const API = "https://suvegwrmzl.execute-api.us-east-2.amazonaws.com";
const token = new URLSearchParams(window.location.search).get("token");

// ================= UI =================
function show(msg, type="error"){
  msg.innerText = msg;
  document.getElementById("msg").innerText = msg;
  document.getElementById("msg").className = "msg " + (type === "success" ? "successText" : "error");
}

function setLoading(state){
  btn.disabled = state;
  spinner.style.display = state ? "inline-block" : "none";
  btnText.style.display = state ? "none" : "inline";
}

// ================= PASSWORD =================
function togglePass(id){
  const input = document.getElementById(id);
  input.type = input.type === "password" ? "text" : "password";
}

// ================= VALIDATION =================
function validateAll(){

  const pass = document.getElementById("password").value;
  const confirm = document.getElementById("confirm").value;

  const rules = {
    len: pass.length >= 8,
    upper: /[A-Z]/.test(pass),
    num: /[0-9]/.test(pass),
    sym: /[^A-Za-z0-9]/.test(pass)
  };

  document.getElementById("r1").className = rules.len ? "ok" : "";
  document.getElementById("r2").className = rules.upper ? "ok" : "";
  document.getElementById("r3").className = rules.num ? "ok" : "";
  document.getElementById("r4").className = rules.sym ? "ok" : "";

  let score = Object.values(rules).filter(Boolean).length;

  const colors = ["red","orange","lime","cyan"];
  const labels = ["Weak","Medium","Strong","Very Strong"];

  strengthFill.style.width = (score * 25) + "%";
  strengthFill.style.background = colors[score-1] || "red";
  strengthText.innerText = labels[score-1] || "";

  if(confirm){
    if(pass === confirm){
      matchText.innerText = "Passwords match ✔";
      matchText.className = "match ok";
    } else {
      matchText.innerText = "Passwords do not match ❌";
      matchText.className = "match bad";
    }
  }

  btn.disabled = !(pass === confirm && score === 4);
}

// ================= CONFETTI =================
function confetti(){
  const container = document.createElement("div");
  container.className = "confetti";
  document.body.appendChild(container);

  for(let i=0;i<80;i++){
    const c = document.createElement("div");
    c.style.left = Math.random()*100+"%";
    c.style.background = ["#0ff","#22c55e","#3b82f6","#f59e0b"][Math.floor(Math.random()*4)];
    container.appendChild(c);
  }

  setTimeout(()=>container.remove(),2000);
}

// ================= RESET =================
async function resetPassword(){

  const pass = document.getElementById("password").value;

  if(!token){
    show("Invalid link ❌");
    return;
  }

  setLoading(true);

  try {

    const res = await fetch(API+"/reset",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ token, password: pass })
    });

    const text = await res.text();

    if(res.status !== 200){
      show(text);
      setLoading(false);
      return;
    }

    show("Password updated 🎉","success");
    confetti();

    // 🔥 AUTO LOGIN
    const user = localStorage.getItem("lastUser");

    if(user){
      try {
        const loginRes = await fetch(API+"/login",{
          method:"POST",
          headers:{ "Content-Type":"application/json" },
          body: JSON.stringify({
            username:user,
            password:pass,
            captcha:"bypass"
          })
        });

        const data = await loginRes.json();

        if(data.token){
          localStorage.setItem("token", data.token);
          setTimeout(()=>window.location.href="dashboard.html",1200);
          return;
        }

      } catch {}
    }

    setTimeout(()=>window.location.href="index.html",1500);

  } catch {
    show("Network error ❌");
  }

  setLoading(false);
}
</script>

</body>
</html>
