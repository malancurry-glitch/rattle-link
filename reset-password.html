<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Reset Password - Rattle Link</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter, Arial;
  background:radial-gradient(circle at top,#020617,#000);
  color:#e2e8f0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.wrapper{
  display:flex;
  width:800px;
  max-width:95%;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.7);
}

.left{
  flex:1;
  background:linear-gradient(135deg,#3b82f6,#06b6d4);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
  color:white;
  padding:20px;
}

.card{
  flex:1;
  background:#020617;
  padding:30px;
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid rgba(0,255,255,0.2);
  background:#000;
  color:#0ff;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#0ff;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

button:disabled{
  opacity:.6;
}

.msg{ margin-top:12px; font-size:13px; }
.error{ color:#ef4444; }
.successText{ color:#22c55e; }
.warn{ color:#f59e0b; }

.backend{
  margin-top:10px;
  font-size:11px;
  color:#00ffff;
  border:1px solid rgba(0,255,255,0.2);
  padding:4px 8px;
  border-radius:999px;
  display:inline-block;
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="left">
    <h1>🐍 Rattle Link</h1>
    <p>Secure password reset</p>
  </div>

  <div class="card">

    <h2>Reset Password</h2>

    <input id="password" type="password" placeholder="New Password">
    <input id="confirm" type="password" placeholder="Confirm Password">

    <button onclick="resetPassword()" id="btn">Reset Password</button>

    <div id="msg" class="msg"></div>
    <div id="backend" class="backend" style="display:none;"></div>

  </div>
</div>

<script>
// ================= HYBRID CONFIG =================
const PRIMARY_API = "https://your-backend2-domain.com";
const LEGACY_API = "https://suvegwrmzl.execute-api.us-east-2.amazonaws.com/production";

// ================= PARAMS =================
const params = new URLSearchParams(window.location.search);
const token = params.get("token");
const forcedBackend = params.get("backend"); // primary or legacy
const email = params.get("email") || "";

// ================= ELEMENTS =================
const msgBox = document.getElementById("msg");
const btn = document.getElementById("btn");
const backendBox = document.getElementById("backend");

// ================= UI =================
function show(message, type="error"){
  msgBox.innerText = message;
  msgBox.className = "msg " + (type === "success" ? "successText" : type === "warn" ? "warn" : "error");
}

function showBackend(name){
  if(!name){
    backendBox.style.display = "none";
    return;
  }
  backendBox.style.display = "inline-block";
  backendBox.innerText = "Handled by " + (name === "primary" ? "Backend 2" : "AWS Legacy");
}

// ================= API =================
function normalize(url){
  return String(url).replace(/\/+$/, "");
}

async function safeJson(res){
  try{
    return await res.json();
  }catch{
    return {};
  }
}

async function callApi(base, path, options){
  const res = await fetch(normalize(base) + path, options);
  const data = await safeJson(res);
  return { res, data };
}

function shouldFallback(status){
  return status >= 500 || status === 404;
}

async function apiHybrid(path, options){

  // forced backend mode
  if(forcedBackend === "primary"){
    const r = await callApi(PRIMARY_API, path, options);
    return { ...r, backend: "primary" };
  }

  if(forcedBackend === "legacy"){
    const r = await callApi(LEGACY_API, path, options);
    return { ...r, backend: "legacy" };
  }

  // try primary first
  try{
    const first = await callApi(PRIMARY_API, path, options);

    if(first.res.ok){
      return { ...first, backend: "primary" };
    }

    // IMPORTANT: do NOT fallback on invalid token
    if(!shouldFallback(first.res.status)){
      return { ...first, backend: "primary" };
    }

  }catch{}

  // fallback
  const second = await callApi(LEGACY_API, path, options);
  return { ...second, backend: "legacy" };
}

// ================= RESET =================
async function resetPassword(){

  const pass = document.getElementById("password").value;
  const confirm = document.getElementById("confirm").value;

  if(!token){
    show("Invalid or missing token ❌");
    return;
  }

  if(pass.length < 6){
    show("Password must be 6+ chars ❌");
    return;
  }

  if(pass !== confirm){
    show("Passwords do not match ❌");
    return;
  }

  btn.disabled = true;
  show("");

  try{

    const result = await apiHybrid("/reset", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        token: token,
        password: pass
      })
    });

    const data = result.data || {};

    showBackend(result.backend);

    if(!result.res.ok){
      show(data.message || "Reset failed ❌");
      btn.disabled = false;
      return;
    }

    show("Password updated successfully 🎉", "success");

    setTimeout(()=>{
      let url = "login.html";
      if(email){
        url += `?email=${encodeURIComponent(email)}&backend=${result.backend}`;
      }
      window.location.href = url;
    },1500);

  }catch(e){
    console.error(e);
    show("Network error ❌");
  }

  btn.disabled = false;
}
</script>

</body>
</html>
