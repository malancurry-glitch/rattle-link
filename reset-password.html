<!DOCTYPE html>
<html>
<head>
  <title>Reset Password - Rattle Link</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:Inter, Arial;
  background:radial-gradient(circle at top, #020617, #000);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.wrapper {
  display:flex;
  width:750px;
  max-width:95%;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.7);
}

.left {
  flex:1;
  background:linear-gradient(135deg,#3b82f6,#06b6d4);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

.card {
  flex:1;
  background:#020617;
  padding:30px;
  text-align:center;
}

input {
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #0ff;
  background:#000;
  color:#0ff;
}

button {
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#0ff;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

.msg{ margin-top:10px; }
.error{ color:#ef4444; }
.successText{ color:#22c55e; }
</style>
</head>

<body>

<div class="wrapper">
  <div class="left">
    <h1>🐍 Rattle Link</h1>
    <p>Secure password reset</p>
  </div>

  <div class="card">

    <h2>Reset Password</h2>

    <input id="password" type="password" placeholder="New Password">
    <input id="confirm" type="password" placeholder="Confirm Password">

    <button onclick="resetPassword()" id="btn">Reset Password</button>

    <div id="msg" class="msg"></div>

  </div>
</div>

<script>
const API = "https://suvegwrmzl.execute-api.us-east-2.amazonaws.com/production";
const token = new URLSearchParams(window.location.search).get("token");

const msgBox = document.getElementById("msg");
const btn = document.getElementById("btn");

// ================= UI =================
function show(message, type="error"){
  msgBox.innerText = message;
  msgBox.className = "msg " + (type === "success" ? "successText" : "error");
}

// ================= RESET =================
async function resetPassword(){

  const pass = document.getElementById("password").value;
  const confirm = document.getElementById("confirm").value;

  if(!token){
    show("Invalid or missing token ❌");
    return;
  }

  if(pass.length < 6){
    show("Password must be 6+ chars ❌");
    return;
  }

  if(pass !== confirm){
    show("Passwords do not match ❌");
    return;
  }

  btn.disabled = true;

  try {

    const res = await fetch(API + "/reset", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        token: token,
        password: pass
      })
    });

    const text = await res.text();

    console.log("RESET RESPONSE:", res.status, text);

    if(res.status !== 200){
      show(text || "Reset failed ❌");
      btn.disabled = false;
      return;
    }

    show("Password updated successfully 🎉", "success");

    setTimeout(()=>{
      window.location.href = "index.html";
    },1500);

  } catch (e){
    console.error(e);
    show("Network error ❌");
  }

  btn.disabled = false;
}
</script>

</body>
</html>
